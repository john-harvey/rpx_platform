<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Meeting</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <div id="lobby" class="screen">
      <h1>Secure Meeting</h1>
      <div class="controls">
        <button id="createBtn">Create Meeting</button>
        
        <div id="createOptions" class="hidden">
          <input type="password" id="passphraseInput" placeholder="Optional: Set passphrase">
          <button id="confirmCreateBtn">Create</button>
          <button id="cancelCreateBtn">Cancel</button>
        </div>
        
        <div class="join-group">
          <input type="text" id="roomInput" placeholder="Enter meeting ID or invite link">
          <button id="joinBtn">Join Meeting</button>
        </div>
        
        <div id="passphrasePrompt" class="hidden">
          <input type="password" id="joinPassphraseInput" placeholder="Enter passphrase">
          <button id="submitPassphraseBtn">Submit</button>
        </div>
      </div>
    </div>

    <div id="meeting" class="screen hidden">
      <div id="header">
        <span id="roomIdDisplay"></span>
        <span id="subRoomDisplay" style="margin-left: 12px;"></span>

        <div id="hostControls" class="hidden">
          <button id="createBreakoutsBtn" class="host-btn">🧩 Breakouts</button>
          <button id="generateTokenBtn" class="host-btn">🎟️ Generate Invite</button>
          <button id="setPassphraseBtn" class="host-btn">🔑 Set Password</button>
          <button id="lockRoomBtn" class="host-btn">🔓 Lock</button>
        </div>

        <button id="returnMainBtn">Return to Main</button>
        <button id="leaveBtn">Leave</button>
      </div>

      <div id="meetingBody">
        <div id="videoGrid"></div>

        <aside id="breakoutsPanel" class="hidden">
          <div class="panel-header">
            <div class="panel-title">Breakouts</div>
            <div class="panel-subtitle" id="breakoutsSummary"></div>
          </div>
          <div id="breakoutsRooms"></div>
          <div class="panel-footer">
            <small>Host can move participants between rooms. Video follows the room you join.</small>
          </div>
        </aside>
      </div>

      <div id="controls">
        <button id="toggleVideo" class="control-btn">📹</button>
        <button id="toggleAudio" class="control-btn">🎤</button>
      </div>
    </div>

    <!-- Custom Modal Dialogs -->
    <div id="customModal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <input type="text" id="modalInput" placeholder="">
        <div class="modal-buttons">
          <button id="modalOk">OK</button>
          <button id="modalCancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/client.js"></script>
</body>
</html>
